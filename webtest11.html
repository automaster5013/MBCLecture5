<html>

<head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <title>rowspan 예제</title>
</head>

<body>
    <table border="1">
        <tr>
          <th>구분</th>
          <th>항목</th>
        </tr>
        <tr>
          <td rowspan="2">과일</td> <!-- 2개의 행을 세로로 합침(rowspan) -->
          <td>사과</td>
        </tr>
        <tr>
          <!-- <td>과일</td> <- 이 셀은 rowspan에 의해 대체되므로 삭제 -->
          <td>바나나</td>
        </tr>
      </table>
      
</body>

</html>

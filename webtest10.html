<body>
    <table border="1">
        <tr>
          <th>이름</th>
          <th colspan="2">연락처</th> <!-- 2개 열 병합(colspan) -->
        </tr>
        <tr>
          <td>김철수</td>
          <td>전화</td>
          <td>이메일</td>
        </tr>
      </table>
     
</body>
